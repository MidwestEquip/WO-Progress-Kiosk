                                                                </div>
                                                            </div>
                                                            <div v-if="order.chute_bracket_last_updated" class="text-xs text-slate-900 tabular-nums leading-tight">
                                                                {{ order.chute_bracket_last_updated.slice(0,10) }}
                                                            </div>
                                                        </div>
                                                    </template>
                                                    <!-- Normal part: single Status badge -->
                                                    <template v-else>
                                                        <div @click.stop="startCellEdit(order.id,'status',order.status)" @mousedown.stop>
                                                            <select v-if="openOrderEditingCell.id===order.id && openOrderEditingCell.field==='status'"
                                                                    v-model="openOrderEditingValue"
                                                                    :ref="el=>{if(el)el.focus()}"
                                                                    @change="saveCellEdit(order.id,'status')"
                                                                    @blur="saveCellEdit(order.id,'status')"
                                                                    @keydown.escape.prevent="cancelCellEdit()"
                                                                    @click.stop @mousedown.stop
                                                                    class="w-full border border-indigo-400 rounded px-1 py-0.5 text-xs focus:outline-none">
                                                                <option v-for="s in openOrderStatuses" :key="s" :value="s">{{ s }}</option>
                                                            </select>
                                                            <span v-else
                                                                  :class="openOrderStatusClass(order.status)"
                                                                  class="inline-block px-1.5 py-0.5 rounded text-xs font-semibold whitespace-nowrap cursor-pointer">
                                                                {{ order.status || 'New' }}
                                                            </span>
                                                            <div v-if="order.last_status_update" class="text-xs text-slate-900 tabular-nums mt-0.5 leading-tight">
                                                                {{ order.last_status_update.slice(0,10) }}
                                                            </div>
                                                        </div>
                                                        <!-- Request WO / PO shortcuts (pre-fill + jump to request form).
                                                             Hidden in New Orders — the triage column already offers Req WO / Req PO. -->
                                                        <div v-if="canRequestFromOpenOrder(order) && section.type !== 'new'" class="flex items-center gap-1 mt-1" @click.stop @mousedown.stop>
                                                            <button @click="requestWoFromOpenOrder(order)" title="Request a WO for this part (pre-filled)"
                                                                    class="text-purple-600 hover:text-white hover:bg-purple-500 border border-purple-300 rounded px-1 py-0.5 text-[10px] font-bold leading-none transition-colors">
                                                                Req WO
                                                            </button>
                                                            <button @click="requestPoFromOpenOrder(order)" title="Request a PO for this part (pre-filled)"
                                                                    class="text-violet-600 hover:text-white hover:bg-violet-500 border border-violet-300 rounded px-1 py-0.5 text-[10px] font-bold leading-none transition-colors">
                                                                Req PO
                                                            </button>
                                                        </div>
                                                    </template>
                                                    <span v-if="order.backordered" class="inline-block mt-1 px-1.5 py-0.5 rounded text-[10px] font-bold bg-violet-100 text-violet-800 whitespace-nowrap">&#9873; BACKORDERED</span>
                                                </div>

                                                <!-- Col 17: Date Entered -->
                                                <div class="min-w-0 text-xs" @click.stop="startCellEdit(order.id,'date_entered',order.date_entered)" @mousedown.stop>
                                                    <input v-if="openOrderEditingCell.id===order.id && openOrderEditingCell.field==='date_entered'"
                                                           v-model="openOrderEditingValue" type="date"
                                                           :ref="el=>{if(el)el.focus()}"
                                                           @blur="saveCellEdit(order.id,'date_entered')"
                                                           @keydown.enter.prevent="saveCellEdit(order.id,'date_entered')"
                                                           @keydown.escape.prevent="cancelCellEdit()"
                                                           @click.stop @mousedown.stop
                                                           class="w-full border border-indigo-400 rounded px-1 text-xs focus:outline-none" />
                                                    <span v-else class="cursor-text hover:bg-black/[0.04] rounded px-0.5 -mx-0.5 text-slate-900">{{ order.date_entered || '—' }}</span>
                                                </div>

                                                <!-- Col 18: Delete / Cancel -->
                                                <div class="flex flex-col items-center gap-1 pt-0.5" @click.stop @mousedown.stop>
                                                    <button v-if="sessionRole === 'manager'"
                                                            @click="deleteOpenOrder(order.id, order.part_number)"
                                                            title="Delete row"
                                                            class="text-slate-300 hover:text-red-500 transition-colors">
                                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                                                        </svg>
                                                    </button>
                                                    <button @click="cancelOpenOrder(order.id, order.part_number)"
                                                            title="Cancel row"
                                                            class="text-slate-300 hover:text-orange-500 transition-colors">
                                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                            <circle cx="12" cy="12" r="9" stroke-width="2"/>
                                                            <path stroke-linecap="round" stroke-width="2" d="M5.6 5.6l12.8 12.8"/>
                                                        </svg>
                                                    </button>
                                                </div>

                                            </div><!-- end main grid row -->

                                            <!-- Line 3: override note (conditional) -->
                                            <div v-if="openOrderHasLine3(order)"
                                                 class="flex items-center flex-wrap gap-x-4 gap-y-0 px-2 pb-1.5 text-xs ml-10 text-slate-900 bg-black/[0.02]">
                                                <span v-if="order.override"><span class="text-amber-600 font-semibold">Override:</span> <span class="text-amber-700">{{ order.override }}</span></span>
                                            </div>

                                        </div><!-- end order row -->

                                        <!-- Drop zone: after this row -->
                                        <div class="mx-2 rounded transition-all"
                                             :class="openOrderDropZoneTarget === section.type+':'+(idx+1) ? 'h-1.5 bg-indigo-400 my-0.5' : 'h-0'"
                                             @dragover="onDropZoneDragOver($event, section.type, idx+1)"
                                             @dragleave="clearDropZone()"
                                             @drop="reorderDrop($event, section.type, idx+1)">
                                        </div>

                                    </template><!-- end row + drop zone template -->

                                </div><!-- end rows container -->

                        </div><!-- end section card -->
                    </template><!-- end sections v-for -->

                </div><!-- end scrollable content -->

                <!-- Selection action bar lives in view-open-orders-actionbar.html (split for line cap) -->
            </div><!-- end open orders view -->
