            <!-- ── CREATE WO ──────────────────────────────────────── -->
            <div v-if="currentView === 'create_wo'"
                class="h-full w-full bg-gray-50 absolute inset-0 flex flex-col overflow-hidden">

                <!-- Header bar -->
                <div class="bg-white border-b border-gray-200 shrink-0 px-6 py-4 flex items-center gap-4">
                    <button @click="goBack"
                        class="bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-xl p-2 active:scale-95 transition-transform flex items-center justify-center shrink-0">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"/>
                        </svg>
                    </button>
                    <h2 class="text-2xl font-extrabold text-gray-800">Create Work Orders</h2>

                    <!-- Tabs -->
                    <div class="ml-4 flex gap-1 bg-gray-100 rounded-xl p-1">
                        <button @click="switchCreateWoTab('pending')"
                            :class="createWoTab === 'pending'
                                ? 'bg-white text-gray-800 shadow-sm'
                                : 'text-gray-500 hover:text-gray-700'"
                            class="px-4 py-1.5 rounded-lg text-sm font-semibold transition-all">
                            To Create
                            <span v-if="createWoItems.length > 0"
                                class="ml-1.5 bg-amber-100 text-amber-700 text-xs font-bold px-1.5 py-0.5 rounded-full">
                                {{ createWoItems.length }}
                            </span>
                        </button>
                        <button @click="switchCreateWoTab('created')"
                            :class="createWoTab === 'created'
                                ? 'bg-white text-gray-800 shadow-sm'
                                : 'text-gray-500 hover:text-gray-700'"
                            class="px-4 py-1.5 rounded-lg text-sm font-semibold transition-all">
                            Created
                        </button>
                    </div>
                </div>

                <!-- Body -->
                <div class="flex-1 overflow-y-auto p-5">

                    <div v-if="createWoLoading" class="flex items-center justify-center h-32 text-gray-400 text-sm">
                        Loading...
                    </div>

                    <!-- ── TO CREATE tab ── -->
                    <template v-else-if="createWoTab === 'pending'">
                        <div v-if="createWoItems.length === 0"
                            class="flex flex-col items-center justify-center h-48 text-gray-400">
                            <svg class="w-12 h-12 mb-3 opacity-30" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                            </svg>
                            <p class="font-medium text-base">No approved WOs waiting</p>
                            <p class="text-xs mt-1">Requests become available here after manager approval</p>
                        </div>

                        <div v-else class="space-y-4">
                            <div class="grid grid-cols-[1fr_auto] gap-4 px-5 pb-1">
                                <span class="text-xs font-bold text-gray-400 uppercase tracking-wide">Work Order Details</span>
                                <span class="text-xs font-bold text-gray-400 uppercase tracking-wide text-right pr-1">Set Official WO #</span>
                            </div>

                            <div v-for="group in createWoItemsGrouped" :key="group.travellerId ?? group.items[0].id">
                                <!-- Traveller group header -->
                                <div v-if="group.travellerId" class="flex items-center gap-2 mb-2">
                                    <svg class="w-3.5 h-3.5 text-blue-500 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"/>
                                    </svg>
                                    <span class="text-xs font-bold text-blue-600 uppercase tracking-wide">Traveller #{{ group.travellerId }}</span>
                                    <span class="text-xs text-gray-400">{{ group.items.length }} WOs</span>
                                    <div class="flex-1 border-t border-blue-200"></div>
                                </div>

                                <!-- Cards (indented for traveller groups) -->
                                <div class="space-y-2" :class="group.travellerId ? 'pl-4 border-l-2 border-blue-200' : ''">
                                    <div v-for="req in group.items" :key="req.id"
                                        class="border rounded-xl shadow-sm flex items-center gap-4 px-5 py-4"
                                        :class="req.parent_request_id ? 'bg-gray-50 border-gray-200' : 'bg-white border-gray-200'">
                                        <div class="flex-1 min-w-0">
                                            <div class="flex items-center gap-2 flex-wrap">
                                                <span class="font-extrabold text-gray-800 text-lg font-mono">{{ req.part_number }}</span>
                                                <span :class="{
                                                    'bg-green-100 text-green-700': req.status === 'approved',
                                                    'bg-blue-100  text-blue-700':  req.status === 'in production'
                                                }" class="text-xs font-bold px-2 py-0.5 rounded-full uppercase">{{ req.status }}</span>
                                                <span v-if="req.parent_request_id" class="bg-blue-100 text-blue-600 text-xs font-bold px-2 py-0.5 rounded-full uppercase">Subpart</span>
                                                <span v-if="req.job_number" class="bg-slate-100 text-slate-700 text-xs font-bold px-2 py-0.5 rounded-full font-mono border border-slate-200">Job #{{ req.job_number }}</span>
                                            </div>
                                            <p v-if="req.description" class="text-sm text-gray-500 mt-0.5 truncate">{{ req.description }}</p>
                                            <div class="flex flex-wrap gap-x-5 gap-y-0.5 mt-1.5 text-xs text-gray-400">
                                                <span v-if="req.qty_to_make != null">Qty to Make: <span class="text-gray-700 font-semibold">{{ req.qty_to_make }}</span></span>
                                                <span v-if="req.date_to_start">Start: <span class="text-gray-700 font-semibold">{{ req.date_to_start }}</span></span>
                                                <span v-if="req.estimated_lead_time != null">Lead Time: <span class="text-gray-700 font-semibold">{{ req.estimated_lead_time }}d</span></span>
                                                <span v-if="req.assy_wo">Assy WO: <span class="text-gray-700 font-semibold">{{ req.assy_wo }}</span></span>
                                                <span v-if="req.alere_bin">Bin: <span class="text-gray-700 font-semibold">{{ req.alere_bin }}</span></span>
                                                <span v-if="req.submitted_by && !req.parent_request_id" class="text-gray-400">Requested by {{ req.submitted_by }}</span>
                                            </div>
                                        </div>
                                        <button @click="openWoRequestDetail(req)"
                                            class="shrink-0 bg-gray-100 hover:bg-gray-200 text-gray-600 px-3 py-2 rounded-lg text-xs font-semibold transition-colors flex items-center gap-1.5">
                                            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                                            </svg>
                                            Edit Details
                                        </button>
                                        <div class="flex items-center gap-2 shrink-0" v-if="createWoInlineState[req.id]">
                                            <div>
                                                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wide mb-1">Official WO # <span class="normal-case font-normal text-gray-400">(Alere/ERP)</span></label>
                                                <input v-model="createWoInlineState[req.id].wo_number"
                                                    type="text" placeholder="e.g. 12345" maxlength="30"
                                                    class="w-36 px-3 py-2 border border-gray-300 rounded-lg text-gray-800 focus:outline-none focus:border-blue-400 text-sm font-mono">
                                            </div>
                                            <div class="pt-5">
                                                <button @click="setAlereWoNumber(req.id)" :disabled="loading || !createWoInlineState[req.id].wo_number.trim()"
                                                    :class="createWoInlineState[req.id].wo_number.trim() ? 'bg-blue-600 hover:bg-blue-500 text-white active:scale-95' : 'bg-gray-100 text-gray-300 cursor-not-allowed'"
                                                    class="px-4 py-2 rounded-xl font-bold text-sm uppercase tracking-wide transition-all disabled:opacity-40">
                                                    Set WO #
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </template>

                    <!-- ── CREATED tab ── -->
                    <template v-else-if="createWoTab === 'created'">
                        <div v-if="createdWoItems.length === 0"
                            class="flex flex-col items-center justify-center h-48 text-gray-400">
                            <p class="font-medium text-base">No created WOs yet</p>
                            <p class="text-xs mt-1">WOs appear here after they are confirmed</p>
                        </div>

                        <div v-else class="space-y-2">
                            <div class="px-1 pb-1 text-xs font-bold text-gray-400 uppercase tracking-wide">
                                {{ createdWoItems.length }} Created WO{{ createdWoItems.length !== 1 ? 's' : '' }}
                            </div>
                            <!-- Table header -->
                            <div class="grid grid-cols-[1fr_1fr_auto_auto_1fr] gap-4 px-5 pb-1 text-xs font-bold text-gray-400 uppercase tracking-wide">
                                <span>Part #</span>
                                <span>Description</span>
                                <span>Alere WO #</span>
                                <span>Qty</span>
                                <span>Created</span>
                            </div>
                            <div v-for="group in createdWoItemsGrouped" :key="group.travellerId ?? group.items[0].id">
                                <!-- Traveller group header -->
                                <div v-if="group.travellerId" class="flex items-center gap-2 mb-2 mt-3">
                                    <svg class="w-3.5 h-3.5 text-blue-500 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"/>
                                    </svg>
                                    <span class="text-xs font-bold text-blue-600 uppercase tracking-wide">Traveller #{{ group.travellerId }}</span>
                                    <span class="text-xs text-gray-400">{{ group.items.length }} WOs</span>
                                    <div class="flex-1 border-t border-blue-200"></div>
                                </div>
                                <!-- Rows (indented for traveller groups) -->
                                <div class="space-y-2" :class="group.travellerId ? 'pl-4 border-l-2 border-blue-200' : ''">
                                    <div v-for="item in group.items" :key="item.id"
                                        @click="openCreatedWoDetail(item)"
                                        class="border border-gray-200 rounded-xl px-5 py-3 grid grid-cols-[1fr_1fr_auto_auto_1fr] gap-4 items-center cursor-pointer hover:border-blue-300 hover:bg-blue-50 transition-colors"
                                        :class="item.parent_request_id ? 'bg-gray-50' : 'bg-white'">
                                        <div class="flex items-center gap-2 flex-wrap">
                                            <span class="font-extrabold text-gray-800 text-sm font-mono">{{ item.part_number }}</span>
                                            <span v-if="item.parent_request_id" class="bg-blue-100 text-blue-600 text-xs font-bold px-2 py-0.5 rounded-full uppercase shrink-0">Subpart</span>
                                            <span v-if="item.job_number" class="bg-slate-100 text-slate-700 text-xs font-bold px-2 py-0.5 rounded-full font-mono border border-slate-200 shrink-0">Job #{{ item.job_number }}</span>
                                            <span v-if="item.status === 'in production'"
                                                class="bg-blue-100 text-blue-700 text-xs font-bold px-2 py-0.5 rounded-full uppercase shrink-0">
                                                In Production
                                            </span>
                                            <span v-else-if="item.status === 'completed'"
                                                class="bg-green-100 text-green-700 text-xs font-bold px-2 py-0.5 rounded-full uppercase shrink-0">
                                                Completed
                                            </span>
                                        </div>
                                        <div class="text-sm text-gray-500 truncate">{{ item.description || '—' }}</div>
                                        <div class="font-mono font-bold text-gray-800 text-sm">{{ item.alere_wo_number || '—' }}</div>
                                        <div class="text-sm text-gray-600">{{ item.qty_to_make ?? '—' }}</div>
                                        <div class="text-xs text-gray-400">
                                            <span class="font-medium text-gray-600">{{ item.created_by_initials }}</span>
                                            <span class="mx-1">·</span>{{ item.created_date }}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </template>

                </div>
            </div>
