        <!-- ══ MESSAGES ════════════════════════════════════════ -->
        <div v-if="currentView === 'messages'" class="h-full w-full bg-slate-900 absolute inset-0 flex overflow-hidden">

            <!-- ── LEFT: Contacts sidebar ─────────────────────── -->
            <div class="w-52 border-r border-slate-700 flex flex-col shrink-0 bg-slate-800/50 min-h-0">
                <div class="px-4 py-3 border-b border-slate-700/60 shrink-0">
                    <span class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Contacts</span>
                </div>
                <div class="flex-1 min-h-0 overflow-y-auto py-2">
                    <button v-for="role in dmContacts" :key="role"
                        @click="openThread(role)"
                        class="w-full flex items-center gap-3 px-4 py-3 text-left transition-colors active:scale-95"
                        :class="activeThread === role
                            ? 'bg-blue-600/20 border-r-2 border-blue-500'
                            : 'hover:bg-slate-700/50'">
                        <!-- Avatar -->
                        <div class="w-9 h-9 rounded-full flex items-center justify-center text-sm font-bold shrink-0"
                            :class="dmAvatarClass(role)">
                            {{ (ROLE_DISPLAY_NAMES[role] || '?')[0] }}
                        </div>
                        <!-- Name + unread -->
                        <div class="flex-1 min-w-0">
                            <div class="text-sm font-semibold text-white truncate">
                                {{ ROLE_DISPLAY_NAMES[role] || role }}
                            </div>
                        </div>
                        <!-- Unread badge -->
                        <span v-if="messageThreads.find(t => t.other_role === role)?.unread_count > 0"
                            class="bg-red-600 text-white text-xs font-bold min-w-5 h-5 px-1 rounded-full flex items-center justify-center shrink-0">
                            {{ messageThreads.find(t => t.other_role === role).unread_count }}
                        </span>
                    </button>
                </div>
            </div>

            <!-- ── RIGHT: Inbox or Thread ─────────────────────── -->
            <div class="flex-1 min-h-0 overflow-hidden flex flex-col">

                <!-- ── INBOX (no contact selected) ──────────────── -->
                <template v-if="!activeThread">
                    <!-- Inbox header -->
                    <div class="px-6 py-4 border-b border-slate-700 flex items-center justify-between shrink-0">
                        <h2 class="text-xl font-bold text-white">Inbox</h2>
                        <span v-if="dmUnreadCount > 0"
                            class="bg-red-600 text-white text-sm font-bold px-3 py-1 rounded-full">
                            {{ dmUnreadCount }} unread
                        </span>
                    </div>

                    <!-- Loading -->
                    <div v-if="messagesLoading" class="flex-1 flex items-center justify-center">
                        <svg class="animate-spin h-7 w-7 text-blue-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                        </svg>
                    </div>

                    <!-- Empty state -->
                    <div v-else-if="dmInboxThreads.length === 0"
                        class="flex-1 flex flex-col items-center justify-center gap-3 text-slate-500">
                        <svg class="w-14 h-14 opacity-30" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                                d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                        </svg>
                        <p class="text-lg font-medium">No messages yet</p>
                        <p class="text-sm">Select a contact on the left to start a conversation.</p>
                    </div>

                    <!-- Inbox message list -->
                    <div v-else class="flex-1 min-h-0 overflow-y-auto divide-y divide-slate-700/50">
                        <div v-for="thread in dmInboxThreads" :key="thread.other_role"
                            @click="openThread(thread.other_role)"
                            class="flex items-center gap-4 px-6 py-4 cursor-pointer hover:bg-slate-800/70 active:bg-slate-700 transition-colors select-none"
                            :class="thread.unread_count > 0 ? 'bg-slate-800/40' : ''">
                            <!-- Avatar -->
                            <div class="w-12 h-12 rounded-full flex items-center justify-center text-xl font-bold shrink-0"
                                :class="dmAvatarClass(thread.other_role)">
                                {{ (ROLE_DISPLAY_NAMES[thread.other_role] || '?')[0] }}
                            </div>
                            <!-- Content -->
                            <div class="flex-1 min-w-0">
                                <div class="flex items-baseline justify-between gap-2 mb-0.5">
                                    <span class="text-white truncate"
                                        :class="thread.unread_count > 0 ? 'font-bold text-base' : 'font-semibold text-base'">
                                        {{ ROLE_DISPLAY_NAMES[thread.other_role] || thread.other_role }}
                                    </span>
                                    <span class="text-slate-400 text-xs shrink-0">{{ formatMsgTime(thread.created_at) }}</span>
                                </div>
                                <div class="flex items-center justify-between gap-2">
                                    <p class="text-sm truncate"
                                       :class="thread.unread_count > 0 ? 'text-slate-200 font-medium' : 'text-slate-400'">
                                        {{ thread.body }}
                                    </p>
                                    <span v-if="thread.unread_count > 0"
                                        class="bg-red-600 text-white text-xs font-bold min-w-5 h-5 px-1 rounded-full flex items-center justify-center shrink-0">
                                        {{ thread.unread_count }}
                                    </span>
                                </div>
                            </div>
                            <svg class="w-4 h-4 text-slate-600 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                            </svg>
                        </div>
                    </div>
                </template>

                <!-- ── THREAD (contact selected) ─────────────────── -->
                <template v-if="activeThread">
                    <!-- Thread header -->
                    <div class="px-6 py-4 border-b border-slate-700 flex items-center gap-3 shrink-0">
                        <div class="w-9 h-9 rounded-full flex items-center justify-center text-sm font-bold shrink-0"
                            :class="dmAvatarClass(activeThread)">
                            {{ (ROLE_DISPLAY_NAMES[activeThread] || '?')[0] }}
                        </div>
                        <div>
                            <div class="text-lg font-bold text-white">
                                {{ ROLE_DISPLAY_NAMES[activeThread] || activeThread }}
                            </div>
                            <div class="text-xs text-slate-400">Direct Message</div>
                        </div>
                    </div>

                    <!-- Messages list -->
                    <div class="flex-1 min-h-0 overflow-y-auto px-6 py-5 flex flex-col gap-4" id="dm-thread-scroll">
                        <div v-if="messagesLoading" class="flex items-center justify-center py-12">
                            <svg class="animate-spin h-6 w-6 text-blue-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                            </svg>
                        </div>
                        <div v-else-if="threadMessages.length === 0"
                            class="flex items-center justify-center py-16 text-slate-500">
                            No messages yet. Send the first one below.
                        </div>
                        <div v-else v-for="msg in threadMessages" :key="msg.id"
                            class="flex items-start gap-3">
                            <div class="w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold shrink-0 mt-0.5"
                                :class="dmAvatarClass(msg.sender_role)">
                                {{ (ROLE_DISPLAY_NAMES[msg.sender_role] || '?')[0] }}
                            </div>
                            <div class="flex-1 min-w-0">
                                <div class="flex items-baseline gap-2 mb-1">
                                    <span class="font-semibold text-white text-sm">
                                        {{ ROLE_DISPLAY_NAMES[msg.sender_role] || msg.sender_role }}
                                    </span>
                                    <span class="text-xs text-slate-500">{{ formatMsgTime(msg.created_at) }}</span>
                                </div>
                                <p class="text-slate-200 text-sm leading-relaxed whitespace-pre-wrap break-words bg-slate-800/60 rounded-xl px-4 py-2.5">
                                    {{ msg.body }}
                                </p>
                            </div>
                            <!-- Delete (manager login only) -->
                            <button v-if="canDeleteMessages" @click="openMsgDeleteConfirm(msg.id)"
                                title="Delete message"
                                class="shrink-0 mt-0.5 p-1.5 rounded-lg text-slate-500 hover:text-red-400 hover:bg-red-500/10 transition-colors active:scale-90">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                                </svg>
                            </button>
                        </div>
                    </div>

                    <!-- Compose box -->
                    <div class="px-6 py-4 border-t border-slate-700 flex gap-3 items-end shrink-0">
                        <textarea v-model="messageBody"
                            @keydown.ctrl.enter.prevent="sendMessage"
                            :disabled="messagesSending"
                            placeholder="Type a message… (Ctrl+Enter to send)"
                            rows="2"
                            class="flex-1 bg-slate-800 border border-slate-600 text-white rounded-xl px-4 py-3 text-sm resize-none focus:outline-none focus:border-blue-500 disabled:opacity-50 placeholder-slate-500">
                        </textarea>
                        <button @click="sendMessage"
                            :disabled="messagesSending || !messageBody.trim()"
                            class="bg-blue-600 hover:bg-blue-500 disabled:opacity-40 text-white font-bold px-6 py-3 rounded-xl text-sm transition-colors active:scale-95 shrink-0 self-end">
                            <span v-if="messagesSending">Sending…</span>
                            <span v-else>Send</span>
                        </button>
                    </div>
                </template>

            </div>

            <!-- Delete message confirmation (manager only) -->
            <div v-if="msgDeleteId"
                class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
                <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm p-6 flex flex-col gap-5">
                    <div class="text-center">
                        <div class="text-3xl mb-3">🗑️</div>
                        <h3 class="text-lg font-extrabold text-gray-800 mb-1">Delete this message?</h3>
                        <p class="text-sm text-gray-500">This permanently removes the message for everyone. This cannot be undone.</p>
                    </div>
                    <div class="flex flex-col gap-2">
                        <button @click="cancelMsgDelete"
                            class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl text-base active:scale-95 transition-transform">
                            No, keep it
                        </button>
                        <button @click="confirmMsgDelete"
                            class="w-full text-red-500 hover:text-red-700 font-semibold py-2 rounded-xl text-sm hover:bg-red-50 transition-colors">
                            Yes, delete
                        </button>
                    </div>
                </div>
            </div>
        </div>
