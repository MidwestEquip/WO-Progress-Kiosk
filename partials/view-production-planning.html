<!-- ============================================================
     view-production-planning.html — Production Planning shell:
     top bar + tab bar only. Tab content lives in
     view-planning-*.html via Teleport into #pp-tab-body.
     ============================================================ -->
<div v-if="currentView === 'production_planning'"
    class="h-full w-full flex flex-col bg-gray-50">

    <!-- ── Top bar ─────────────────────────────────────────── -->
    <div class="shrink-0 bg-white border-b border-gray-200 px-6 py-3 flex items-center gap-4">
        <button @click="exitProductionPlanning"
            class="bg-gray-100 hover:bg-gray-200 text-gray-600 rounded-lg p-2 active:scale-95 transition-transform">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"/>
            </svg>
        </button>
        <div class="flex-1">
            <h1 class="text-xl font-extrabold text-gray-800">Production Planning</h1>
            <p class="text-xs text-gray-400">Base units · demand · make/buy recommendations</p>
        </div>
        <button @click="loadBaseUnits" :disabled="baseUnitsLoading"
            class="flex items-center gap-2 px-4 py-2 bg-gray-100 hover:bg-gray-200 text-gray-600 rounded-lg text-sm font-semibold transition-colors disabled:opacity-50">
            <svg class="w-4 h-4" :class="{ 'animate-spin': baseUnitsLoading }" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
            </svg>
            Refresh
        </button>
    </div>

    <!-- ── Tab bar ─────────────────────────────────────────── -->
    <div class="shrink-0 bg-white border-b border-gray-200 px-6 flex items-center gap-1">
        <button v-for="tab in [
                { key: 'base_units', label: 'Base Units' },
                { key: 'plan',       label: 'Plan' },
                { key: 'review',     label: 'Review & Release' },
                { key: 'schedule',   label: 'Schedule' },
                { key: 'queues',     label: 'Queues & Alerts' },
                { key: 'workload',   label: 'Workload' },
                { key: 'production_load', label: 'Production Load' },
            ]"
            :key="tab.key"
            @click="planningTab = tab.key"
            class="px-4 py-3 text-sm font-semibold border-b-2 transition-colors whitespace-nowrap"
            :class="planningTab === tab.key
                ? 'border-indigo-500 text-indigo-700'
                : 'border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300'">
            {{ tab.label }}
            <span v-if="tab.key === 'queues' && lowStockAlerts.length"
                class="ml-1 inline-flex items-center justify-center min-w-[1.25rem] h-5 px-1 rounded-full text-xs font-bold bg-red-100 text-red-700">
                {{ lowStockAlerts.length }}</span>
        </button>
    </div>

    <!-- ── Tab body — content injected via Teleport from sibling partials ── -->
    <div id="pp-tab-body" class="flex-1 relative overflow-hidden"></div>

</div>
