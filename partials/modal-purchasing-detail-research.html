<!-- ============================================================ -->
<!-- MODAL: Purchasing Detail - Research section (Teleported)     -->
<!-- Teleported into #purchasing-detail-request-body in the       -->
<!-- detail modal body (modal-purchasing-detail.html). Gated by   -->
<!-- purchasingDetailOpen so it only mounts when the modal opens. -->
<!-- ============================================================ -->
<Teleport to="#purchasing-detail-request-body" v-if="purchasingDetailOpen && purchasingDetailOrder">
            <div v-if="purchasingDetailSection === 'request'" class="flex flex-col gap-3 text-sm">

                <div class="grid grid-cols-2 gap-x-6 gap-y-3">
                    <!-- Common -->
                    <div v-if="purchasingDetailOrder.requested_by">
                        <p class="text-xs text-gray-400">Requested By</p>
                        <p class="font-semibold text-gray-800">{{ purchasingDetailOrder.requested_by }}</p>
                    </div>
                    <div v-if="purchasingDetailOrder.needed_by">
                        <p class="text-xs text-gray-400">Needed By</p>
                        <p class="font-semibold text-gray-800">{{ purchasingDetailOrder.needed_by }}</p>
                    </div>
                    <div v-if="purchasingDetailOrder.qty_needed">
                        <p class="text-xs text-gray-400">Qty Requested</p>
                        <p class="font-semibold text-gray-800">{{ purchasingDetailOrder.qty_needed }}</p>
                    </div>

                    <!-- Part fields -->
                    <template v-if="purchasingDetailOrder.request_type === 'part'">
                        <div v-if="purchasingDetailOrder.part_number">
                            <p class="text-xs text-gray-400">Part #</p>
                            <p class="font-semibold text-gray-800">{{ purchasingDetailOrder.part_number }}</p>
                        </div>
                        <div v-if="purchasingDetailOrder.description">
                            <p class="text-xs text-gray-400">Description</p>
                            <p class="font-semibold text-gray-800">{{ purchasingDetailOrder.description }}</p>
                        </div>
                        <div v-if="purchasingDetailOrder.sales_order">
                            <p class="text-xs text-gray-400">Sales Order</p>
                            <p class="font-semibold text-gray-800">{{ purchasingDetailOrder.sales_order }}</p>
                        </div>
                        <div v-if="purchasingDetailOrder.wo_number">
                            <p class="text-xs text-gray-400">WO #</p>
                            <p class="font-semibold text-gray-800">{{ purchasingDetailOrder.wo_number }}</p>
                        </div>
                        <div v-if="purchasingDetailOrder.job_number">
                            <p class="text-xs text-gray-400">Job #</p>
                            <p class="font-semibold text-gray-800">{{ purchasingDetailOrder.job_number }}</p>
                        </div>
                        <div v-if="purchasingDetailOrder.estimated_qty_in_stock != null">
                            <p class="text-xs text-gray-400">Est. Qty in Stock</p>
                            <p class="font-semibold text-gray-800">{{ purchasingDetailOrder.estimated_qty_in_stock }}</p>
                        </div>
                        <div v-if="purchasingDetailOrder.request_location">
                            <p class="text-xs text-gray-400">Location</p>
                            <p class="font-semibold text-gray-800">{{ purchasingDetailOrder.request_location }}</p>
                        </div>
                        <div v-if="purchasingDetailOrder.bin_location">
                            <p class="text-xs text-gray-400">Bin</p>
                            <p class="font-semibold text-gray-800">{{ purchasingDetailOrder.bin_location }}</p>
                        </div>
                    </template>

                    <!-- Supply fields -->
                    <template v-if="purchasingDetailOrder.request_type === 'supply'">
                        <div v-if="purchasingDetailOrder.supply_item_name">
                            <p class="text-xs text-gray-400">Item Name</p>
                            <p class="font-semibold text-gray-800">{{ purchasingDetailOrder.supply_item_name }}</p>
                        </div>
                        <div v-if="purchasingDetailOrder.supply_category">
                            <p class="text-xs text-gray-400">Category</p>
                            <p class="font-semibold text-gray-800">{{ purchasingDetailOrder.supply_category }}</p>
                        </div>
                        <div v-if="purchasingDetailOrder.description">
                            <p class="text-xs text-gray-400">Description</p>
                            <p class="font-semibold text-gray-800">{{ purchasingDetailOrder.description }}</p>
                        </div>
                        <div v-if="purchasingDetailOrder.request_location">
                            <p class="text-xs text-gray-400">Location</p>
                            <p class="font-semibold text-gray-800">{{ purchasingDetailOrder.request_location }}</p>
                        </div>
                    </template>

                    <!-- Steel fields -->
                    <template v-if="purchasingDetailOrder.request_type === 'steel'">
                        <div v-if="purchasingDetailOrder.material_type">
                            <p class="text-xs text-gray-400">Material Type</p>
                            <p class="font-semibold text-gray-800">{{ purchasingDetailOrder.material_type }}</p>
                        </div>
                        <div v-if="purchasingDetailOrder.steel_shape">
                            <p class="text-xs text-gray-400">Shape</p>
                            <p class="font-semibold text-gray-800">{{ purchasingDetailOrder.steel_shape }}</p>
                        </div>
                        <div v-if="purchasingDetailOrder.description">
                            <p class="text-xs text-gray-400">Description</p>
                            <p class="font-semibold text-gray-800">{{ purchasingDetailOrder.description }}</p>
                        </div>
                        <div v-if="purchasingDetailOrder.material_size">
                            <p class="text-xs text-gray-400">Size</p>
                            <p class="font-semibold text-gray-800">{{ purchasingDetailOrder.material_size }}</p>
                        </div>
                        <div v-if="purchasingDetailOrder.material_thickness">
                            <p class="text-xs text-gray-400">Thickness / Gauge</p>
                            <p class="font-semibold text-gray-800">{{ purchasingDetailOrder.material_thickness }}</p>
                        </div>
                        <div v-if="purchasingDetailOrder.material_length">
                            <p class="text-xs text-gray-400">Length</p>
                            <p class="font-semibold text-gray-800">{{ purchasingDetailOrder.material_length }}</p>
                        </div>
                        <div v-if="purchasingDetailOrder.material_grade">
                            <p class="text-xs text-gray-400">Grade / Spec</p>
                            <p class="font-semibold text-gray-800">{{ purchasingDetailOrder.material_grade }}</p>
                        </div>
                    </template>
                </div>

                <!-- Requester notes -->
                <div v-if="purchasingDetailOrder.requester_notes"
                    class="mt-2 bg-amber-50 border border-amber-200 rounded-xl px-4 py-3">
                    <p class="text-xs font-semibold text-amber-700 mb-1">Requester Notes</p>
                    <p class="text-sm text-gray-700 whitespace-pre-line">{{ purchasingDetailOrder.requester_notes }}</p>
                </div>

                <!-- Questions from purchasing -->
                <div v-if="purchasingDetailOrder.purchaser_questions"
                    class="bg-blue-50 border border-blue-200 rounded-xl px-4 py-3">
                    <p class="text-xs font-semibold text-blue-700 mb-1">Questions from Purchasing</p>
                    <p class="text-sm text-gray-700 whitespace-pre-line">{{ purchasingDetailOrder.purchaser_questions }}</p>
                </div>

                <!-- ── Usage data panels (parts only) ──────── -->
                <template v-if="purchasingDetailOrder.request_type === 'part'">
                    <div class="mt-1 pt-3 border-t border-gray-100 flex flex-col gap-4">

                        <!-- ── Last 1 Year ── -->
                        <p class="text-xs text-gray-400 italic">Last report uploaded: {{ LAST_REPORT_DATE }}</p>
                        <div class="border border-gray-200 rounded-xl p-3 flex flex-col gap-2">
                            <div class="flex items-center gap-2">
                                <p class="text-xs font-bold text-gray-700 uppercase tracking-wide">Last 1 Year <span class="font-normal normal-case text-gray-400">(rolling 12 months)</span></p>
                                <svg v-if="purchasingPartUsageLoading || purchasingPartParentUsageLoading"
                                    class="w-3.5 h-3.5 animate-spin text-amber-500 shrink-0" fill="none" viewBox="0 0 24 24">
                                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
                                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>
                                </svg>
                                <span class="text-xs text-gray-400 italic">From Alere transaction history</span>
                            </div>
                            <div class="grid grid-cols-2 gap-2">
                                <div class="bg-gray-50 rounded-lg px-3 py-2">
                                    <p class="text-xs text-gray-400 mb-0.5">Qty Sold</p>
                                    <p class="text-sm font-bold text-gray-800">{{ purchasingPartUsage ? purchasingPartUsage.qty_sold : '—' }}</p>
                                </div>
                                <div class="bg-gray-50 rounded-lg px-3 py-2">
                                    <p class="text-xs text-gray-400 mb-0.5">Qty Sold of Used On</p>
                                    <p class="text-sm font-bold text-gray-800">
                                        <span v-if="purchasingPartParentUsageLoading" class="text-gray-400 italic text-xs">Loading…</span>
                                        <span v-else>{{ purchasingPartParentUsage ?? '—' }}</span>
                                    </p>
                                </div>
                                <div class="bg-gray-50 rounded-lg px-3 py-2">
                                    <p class="text-xs text-gray-400 mb-0.5">Qty Purchased</p>
                                    <p class="text-sm font-bold text-gray-800">{{ purchasingPartUsage ? purchasingPartUsage.qty_purchased_12mo : '—' }}</p>
                                </div>
                                <div class="bg-gray-50 rounded-lg px-3 py-2">
                                    <p class="text-xs text-gray-400 mb-0.5">Qty Used in MFG</p>
                                    <p class="text-sm font-bold text-gray-800">{{ purchasingPartUsage ? purchasingPartUsage.qty_used_mfg : '—' }}</p>
                                </div>
                            </div>
                            <div class="grid grid-cols-3 gap-2">
                                <div class="bg-gray-50 rounded-lg px-3 py-2">
                                    <p class="text-xs text-gray-400 mb-0.5">Est. Qty in Stock</p>
                                    <p v-if="purchasingPartUsageLoading || purchasingPartParentUsageLoading" class="text-xs text-gray-400 italic">Calculating…</p>
                                    <p v-else-if="purchasingPartEstQtyInStock !== null" class="text-sm font-bold"
                                        :class="purchasingPartEstQtyInStock >= 0 ? 'text-slate-700' : 'text-amber-600'">
                                        {{ purchasingPartEstQtyInStock }}
                                    </p>
                                    <p v-else class="text-sm font-bold text-gray-400">—</p>
                                </div>
                                <div class="bg-gray-50 rounded-lg px-3 py-2">
                                    <p class="text-xs text-gray-400 mb-0.5">In Stock (requester)</p>
                                    <p class="text-sm font-bold text-gray-700">{{ purchasingDetailOrder.estimated_qty_in_stock ?? '—' }}</p>
                                    <p v-if="poDetailRealCount" class="text-xs text-emerald-600 font-semibold mt-0.5">Real Count: {{ poDetailRealCountLabel }}</p>
                                </div>
                                <div class="rounded-lg px-3 py-2"
                                    :class="purchasingPartSuggestedQty !== null ? 'bg-blue-50 border border-blue-200' : 'bg-gray-50'">
                                    <p class="text-xs text-gray-400 mb-0.5">Suggested Qty</p>
                                    <p v-if="purchasingPartUsageLoading || purchasingPartParentUsageLoading" class="text-xs text-gray-400 italic">Calculating…</p>
                                    <p v-else-if="purchasingPartSuggestedQty !== null" class="text-sm font-bold text-blue-800">{{ purchasingPartSuggestedQty }}</p>
                                    <p v-else class="text-sm font-bold text-gray-400">—</p>
                                </div>
                            </div>
                        </div>

                        <!-- ── Last 3 Years ── -->
                        <p class="text-xs text-gray-400 italic">Last report uploaded: {{ LAST_REPORT_DATE }}</p>
                        <div class="border border-gray-200 rounded-xl p-3 flex flex-col gap-2">
                            <div class="flex items-center gap-2">
                                <p class="text-xs font-bold text-gray-700 uppercase tracking-wide">Since Jan 2023 <span class="font-normal normal-case text-gray-400">(1/1/23–today)</span></p>
                                <svg v-if="purchasingPartUsageLoading36mo || purchasingPartParentUsageLoading36mo"
                                    class="w-3.5 h-3.5 animate-spin text-amber-500 shrink-0" fill="none" viewBox="0 0 24 24">
                                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
                                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>
                                </svg>
                                <span class="text-xs text-gray-400 italic">From Alere transaction history</span>
                            </div>
                            <div class="grid grid-cols-2 gap-2">
                                <div class="bg-gray-50 rounded-lg px-3 py-2">
                                    <p class="text-xs text-gray-400 mb-0.5">Qty Sold</p>
                                    <p class="text-sm font-bold text-gray-800">{{ purchasingPartUsage36mo ? purchasingPartUsage36mo.qty_sold : '—' }}</p>
                                </div>
                                <div class="bg-gray-50 rounded-lg px-3 py-2">
                                    <p class="text-xs text-gray-400 mb-0.5">Qty Sold of Used On</p>
                                    <p class="text-sm font-bold text-gray-800">
                                        <span v-if="purchasingPartParentUsageLoading36mo" class="text-gray-400 italic text-xs">Loading…</span>
                                        <span v-else>{{ purchasingPartParentUsage36mo ?? '—' }}</span>
                                    </p>
                                </div>
                                <div class="bg-gray-50 rounded-lg px-3 py-2">
                                    <p class="text-xs text-gray-400 mb-0.5">Qty Purchased</p>
                                    <p class="text-sm font-bold text-gray-800">{{ purchasingPartUsage36mo ? purchasingPartUsage36mo.qty_purchased_36mo : '—' }}</p>
                                </div>
                                <div class="bg-gray-50 rounded-lg px-3 py-2">
                                    <p class="text-xs text-gray-400 mb-0.5">Qty Used in MFG</p>
                                    <p class="text-sm font-bold text-gray-800">{{ purchasingPartUsage36mo ? purchasingPartUsage36mo.qty_used_mfg : '—' }}</p>
                                </div>
                            </div>
                            <div class="grid grid-cols-3 gap-2">
                                <div class="bg-gray-50 rounded-lg px-3 py-2">
                                    <p class="text-xs text-gray-400 mb-0.5">Est. Qty in Stock</p>
                                    <p v-if="purchasingPartUsageLoading36mo || purchasingPartParentUsageLoading36mo" class="text-xs text-gray-400 italic">Calculating…</p>
                                    <p v-else-if="purchasingPartEstQtyInStock36mo !== null" class="text-sm font-bold"
                                        :class="purchasingPartEstQtyInStock36mo >= 0 ? 'text-slate-700' : 'text-amber-600'">
                                        {{ purchasingPartEstQtyInStock36mo }}
                                    </p>
                                    <p v-else class="text-sm font-bold text-gray-400">—</p>
                                </div>
                                <div class="bg-gray-50 rounded-lg px-3 py-2">
                                    <p class="text-xs text-gray-400 mb-0.5">In Stock (requester)</p>
                                    <p class="text-sm font-bold text-gray-700">{{ purchasingDetailOrder.estimated_qty_in_stock ?? '—' }}</p>
                                    <p v-if="poDetailRealCount" class="text-xs text-emerald-600 font-semibold mt-0.5">Real Count: {{ poDetailRealCountLabel }}</p>
                                </div>
                                <div class="rounded-lg px-3 py-2"
                                    :class="purchasingPartSuggestedQty36mo !== null ? 'bg-blue-50 border border-blue-200' : 'bg-gray-50'">
                                    <p class="text-xs text-gray-400 mb-0.5">Suggested Qty</p>
                                    <p v-if="purchasingPartUsageLoading36mo || purchasingPartParentUsageLoading36mo" class="text-xs text-gray-400 italic">Calculating…</p>
                                    <p v-else-if="purchasingPartSuggestedQty36mo !== null" class="text-sm font-bold text-blue-800">{{ purchasingPartSuggestedQty36mo }}</p>
                                    <p v-else class="text-sm font-bold text-gray-400">—</p>
                                </div>
                            </div>
                        </div>

                        <!-- Last 3 purchased (enriched, not time-scoped) -->
                        <div>
                            <div class="flex items-center gap-2 mb-1">
                                <p class="text-xs font-semibold text-gray-500">Last 3 Times Purchased</p>
                                <svg v-if="purchasingPartPurchaseHistoryLoading"
                                    class="w-3 h-3 animate-spin text-amber-500 shrink-0" fill="none" viewBox="0 0 24 24">
                                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
                                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>
                                </svg>
                                <button v-if="!purchasingPartPurchaseHistoryLoading && purchasingPartPurchaseHistory.length > 0"
                                    @click="openSupplierCatalogFromHistory"
                                    class="ml-auto text-xs text-blue-600 hover:text-blue-800 font-semibold hover:underline underline-offset-2 shrink-0">
                                    → All from this supplier
                                </button>
                            </div>
                            <div v-if="!purchasingPartPurchaseHistoryLoading && purchasingPartPurchaseHistoryError"
                                class="text-xs text-red-500 italic">Could not load purchase history</div>
                            <div v-else-if="!purchasingPartPurchaseHistoryLoading && purchasingPartPurchaseHistory.length === 0"
                                class="text-xs text-gray-400 italic">No previous purchases found</div>
                            <div v-else class="flex flex-col gap-2">
                                <div v-for="(row, idx) in purchasingPartPurchaseHistory" :key="idx"
                                    class="bg-gray-50 rounded-lg px-3 py-2 text-xs flex flex-col gap-0.5">
                                    <p class="font-bold text-gray-800">{{ row.txn_date }} · Qty {{ row.qty }}<span v-if="row.cost != null"> · ${{ Number(row.cost).toFixed(2) }}</span></p>
                                    <p v-if="row.company_name" class="text-gray-700 font-semibold">{{ row.company_name }}</p>
                                    <p v-else class="text-gray-400 italic">Supplier not found</p>
                                    <p v-if="row.contact || row.phone" class="text-gray-600">
                                        <span v-if="row.contact">{{ row.contact }}</span><span v-if="row.contact && row.phone"> · </span><span v-if="row.phone">{{ row.phone }}</span>
                                    </p>
                                    <p v-if="row.email" class="text-gray-600">{{ row.email }}</p>
                                    <p v-if="row.our_account_number" class="text-gray-600">Acct #: {{ row.our_account_number }}</p>
                                    <p v-if="row.street" class="text-gray-500">{{ row.street }}<span v-if="row.city">, {{ row.city }}</span><span v-if="row.state">, {{ row.state }}</span><span v-if="row.zip"> {{ row.zip }}</span></p>
                                </div>
                            </div>

                            <!-- Company picker (shown when 2+ suppliers found in history) -->
                            <div v-if="supplierCatalogChoices.length > 0" class="mt-2 flex flex-col gap-1.5">
                                <p class="text-xs text-gray-500 font-semibold">Choose a supplier:</p>
                                <div class="flex flex-wrap gap-2">
                                    <button v-for="choice in supplierCatalogChoices" :key="choice.poto"
                                        @click="loadSupplierCatalog(choice.poto, choice.company_name)"
                                        class="px-3 py-1.5 text-xs font-semibold bg-blue-50 hover:bg-blue-100 text-blue-800 border border-blue-200 rounded-lg transition-colors">
                                        {{ choice.company_name || choice.poto }}
                                    </button>
                                </div>
                            </div>

                            <!-- Supplier catalog panel -->
                            <div v-if="supplierCatalogLoading || supplierCatalogCoid"
                                class="mt-3 border border-blue-200 rounded-xl bg-blue-50/40 p-3 flex flex-col gap-2">
                                <div class="flex items-center gap-2">
                                    <p class="text-xs font-bold text-blue-900 truncate flex-1">All purchased from: {{ supplierCatalogName }}</p>
                                    <button @click="clearSupplierCatalog" class="text-gray-400 hover:text-gray-600 text-lg leading-none shrink-0 font-bold">&times;</button>
                                </div>
                                <div v-if="supplierCatalogLoading" class="flex items-center gap-2 py-1">
                                    <svg class="w-4 h-4 animate-spin text-blue-500 shrink-0" fill="none" viewBox="0 0 24 24">
                                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
                                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>
                                    </svg>
                                    <span class="text-xs text-gray-400 italic">Loading catalog…</span>
                                </div>
                                <template v-else>
                                    <input v-model="supplierCatalogSearch" type="text"
                                        placeholder="Filter by part # or description…"
                                        class="w-full border border-blue-200 rounded-lg px-2 py-1 text-xs text-gray-800 bg-white focus:outline-none focus:border-blue-400">
                                    <p v-if="filteredSupplierCatalog.length === 0" class="text-xs text-gray-400 italic">No parts found</p>
                                    <div v-else class="flex flex-col gap-1 max-h-64 overflow-y-auto">
                                        <div v-for="(row, idx) in filteredSupplierCatalog" :key="idx"
                                            class="bg-white border border-gray-100 rounded-lg px-3 py-1.5 text-xs flex items-center gap-2">
                                            <span class="font-bold text-gray-800 shrink-0 w-28 truncate">{{ row.part_number_normalized }}</span>
                                            <span class="text-gray-500 flex-1 truncate">{{ row.description || '—' }}</span>
                                            <span class="text-gray-500 shrink-0 text-right whitespace-nowrap">
                                                <span class="font-semibold text-gray-700">{{ row.total_qty }}</span> pcs &nbsp;·&nbsp; {{ row.last_purchased }}
                                            </span>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </div>

                    </div>
                </template>

                <!-- ── Engineering prints (parts only) ───────── -->
                <template v-if="purchasingDetailOrder.request_type === 'part'">
                    <div class="pt-3 border-t border-gray-100 flex flex-col gap-2">
                        <!-- Toolbar: label + file chips -->
                        <div class="flex items-center gap-3 flex-wrap">
                            <span class="text-xs font-bold text-gray-600 uppercase tracking-wide shrink-0">&#128206; Prints &amp; Files</span>
                            <span v-if="woFilesLoading" class="text-xs text-gray-400 italic">Loading…</span>
                            <template v-else-if="woFiles.length > 0">
                                <div v-for="f in woFiles" :key="f.name"
                                    class="flex items-center gap-1.5 bg-gray-100 border border-gray-200 rounded px-2 py-1 shrink-0">
                                    <span class="text-xs font-bold text-gray-500 uppercase">{{ f.name.split('.').pop() }}</span>
                                    <a :href="f.signedUrl" target="_blank"
                                        class="text-blue-600 hover:text-blue-500 text-xs font-medium max-w-[160px] truncate">{{ f.name }}</a>
                                </div>
                            </template>
                            <span v-else class="text-xs text-gray-400 italic">No prints on file for this part #</span>
                        </div>
                        <!-- File previews -->
                        <template v-if="!woFilesLoading">
                            <template v-for="f in woFiles" :key="'prev-'+f.name">
                                <!-- PDF → iframe -->
                                <iframe v-if="f.name.match(/\.pdf$/i)"
                                    :src="f.signedUrl"
                                    class="w-full border border-gray-200 rounded-lg"
                                    style="height:520px"
                                    title="PDF Preview">
                                </iframe>
                                <!-- Image → img -->
                                <img v-else-if="f.name.match(/\.(png|jpe?g|gif|bmp|tiff?|webp|svg)$/i)"
                                    :src="f.signedUrl"
                                    class="w-full border border-gray-200 rounded-lg object-contain bg-gray-50"
                                    style="max-height:520px"
                                    :alt="f.name">
                            </template>
                        </template>
                    </div>
                </template>

            </div>
</Teleport>
