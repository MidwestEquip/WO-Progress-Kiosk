<!-- ============================================================
     view-purchasing.html — Purchasing shell: top bar + tab bar only.
     Tab content lives in view-purchasing-ordering/approval/completed/quotes.html
     via Vue 3 Teleport into #po-tab-body.
     ============================================================ -->
<div v-if="currentView === 'purchasing'"
    class="h-full w-full flex flex-col bg-gray-50">

    <!-- ── Top bar ─────────────────────────────────────────── -->
    <div class="shrink-0 bg-white border-b border-gray-200 px-6 py-3 flex items-center gap-4">
        <button @click="goBack"
            class="bg-gray-100 hover:bg-gray-200 text-gray-600 rounded-lg p-2 active:scale-95 transition-transform">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"/>
            </svg>
        </button>
        <div class="flex-1">
            <h1 class="text-xl font-extrabold text-gray-800">Purchasing</h1>
            <p class="text-xs text-gray-400">Parts · Supplies · Steel ordering</p>
        </div>
        <button @click="loadPurchasingOrders" :disabled="purchasingLoading"
            class="flex items-center gap-2 px-4 py-2 bg-gray-100 hover:bg-gray-200 text-gray-600 rounded-lg text-sm font-semibold transition-colors disabled:opacity-50">
            <svg class="w-4 h-4" :class="{ 'animate-spin': purchasingLoading }" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
            </svg>
            Refresh
        </button>
    </div>

    <!-- ── Tab bar ─────────────────────────────────────────── -->
    <div class="shrink-0 bg-white border-b border-gray-200 px-6 flex items-center gap-1">
        <button v-for="tab in [
                { key: 'parts',      label: 'Parts Ordering'    },
                { key: 'supplies',   label: 'Supplies Ordering' },
                { key: 'steel',      label: 'Steel Ordering'    },
                { key: 'all_quotes', label: 'All Quotes'        },
                { key: 'completed',  label: 'Completed'         },
            ]"
            :key="tab.key"
            @click="switchPurchasingTab(tab.key); tab.key === 'all_quotes' && loadAllQuotes()"
            class="px-4 py-3 text-sm font-semibold border-b-2 transition-colors whitespace-nowrap"
            :class="purchasingTab === tab.key
                ? 'border-amber-500 text-amber-700'
                : 'border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300'">
            {{ tab.label }}
            <span v-if="purchasingTabCounts[tab.key] > 0"
                class="ml-1.5 inline-flex items-center justify-center min-w-[1.25rem] h-5 px-1 rounded-full text-xs font-bold"
                :class="purchasingTab === tab.key ? 'bg-amber-100 text-amber-700' : 'bg-gray-100 text-gray-500'">
                {{ purchasingTabCounts[tab.key] }}
            </span>
        </button>
        <button v-if="['parts','supplies','steel'].includes(purchasingTab)"
            @click="openQuoteBuilder"
            class="ml-auto flex items-center gap-1.5 px-3 py-1.5 bg-purple-600 hover:bg-purple-500 text-white text-xs font-bold rounded-lg transition-colors">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"/>
            </svg>
            New Quote
        </button>
    </div>

    <!-- ── Tab body — content injected via Teleport from sibling partials ── -->
    <div id="po-tab-body" class="flex-1 relative overflow-hidden"></div>

</div>
