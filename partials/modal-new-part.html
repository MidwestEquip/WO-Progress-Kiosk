<!-- ============================================================
     modal-new-part.html — New Part form (native item_master row)
     Opened from the BOM tab's New Part button or automatically
     when an unknown part # is used in the BOM editor.
     ============================================================ -->
<div v-if="newPartOpen"
    class="fixed inset-0 bg-black/50 z-[60] flex items-center justify-center p-4"
    @click.self="closeNewPartForm">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-3xl max-h-[92vh] overflow-y-auto p-6">
        <h2 class="text-lg font-extrabold text-gray-800 mb-1">New Part</h2>
        <p class="text-xs text-gray-400 mb-4">Creates a native item master record (marked "native" — safe from Alere imports).</p>

        <!-- Identity -->
        <div class="grid grid-cols-3 gap-3 mb-3">
            <div>
                <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1">Part # <span class="text-red-500">*</span></label>
                <input v-model="newPartForm.item" type="text"
                    class="w-full px-3 py-2 border rounded-lg text-gray-800 text-sm font-mono uppercase focus:outline-none focus:border-teal-400"
                    :class="newPartErrors.item ? 'border-red-400' : 'border-gray-300'">
            </div>
            <div class="col-span-2">
                <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1">Description <span class="text-red-500">*</span></label>
                <input v-model="newPartForm.descrip" type="text"
                    class="w-full px-3 py-2 border rounded-lg text-gray-800 text-sm focus:outline-none focus:border-teal-400"
                    :class="newPartErrors.descrip ? 'border-red-400' : 'border-gray-300'">
            </div>
        </div>

        <!-- Classification -->
        <div class="grid grid-cols-4 gap-3 mb-3">
            <div>
                <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1">Item Type</label>
                <input v-model="newPartForm.item_type" type="text"
                    class="w-full px-3 py-2 border border-gray-300 rounded-lg text-gray-800 text-sm focus:outline-none focus:border-teal-400">
            </div>
            <div>
                <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1">Prod Class</label>
                <input v-model="newPartForm.prodclas" type="text"
                    class="w-full px-3 py-2 border border-gray-300 rounded-lg text-gray-800 text-sm focus:outline-none focus:border-teal-400">
            </div>
            <div>
                <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1">Price Group</label>
                <input v-model="newPartForm.pricegrp" type="text"
                    class="w-full px-3 py-2 border border-gray-300 rounded-lg text-gray-800 text-sm focus:outline-none focus:border-teal-400">
            </div>
            <div>
                <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1">GL Item Group</label>
                <input v-model="newPartForm.glinvtgr" type="text"
                    class="w-full px-3 py-2 border border-gray-300 rounded-lg text-gray-800 text-sm focus:outline-none focus:border-teal-400">
            </div>
        </div>

        <!-- Inventory + pricing -->
        <div class="grid grid-cols-4 gap-3 mb-3">
            <div>
                <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1">On Hand</label>
                <input v-model="newPartForm.lonhand" type="number" step="any"
                    class="w-full px-3 py-2 border border-gray-300 rounded-lg text-gray-800 text-sm focus:outline-none focus:border-teal-400">
            </div>
            <div>
                <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1">Price ($)</label>
                <input v-model="newPartForm.regprice" type="number" step="any" min="0"
                    class="w-full px-3 py-2 border border-gray-300 rounded-lg text-gray-800 text-sm focus:outline-none focus:border-teal-400">
            </div>
            <div>
                <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1">Shipping Price ($)</label>
                <input v-model="newPartForm.ship_price" type="number" step="any" min="0"
                    class="w-full px-3 py-2 border border-gray-300 rounded-lg text-gray-800 text-sm focus:outline-none focus:border-teal-400">
            </div>
            <div>
                <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1">Box Weight (lb)</label>
                <input v-model="newPartForm.box_weight" type="number" step="any" min="0"
                    class="w-full px-3 py-2 border border-gray-300 rounded-lg text-gray-800 text-sm focus:outline-none focus:border-teal-400">
            </div>
        </div>

        <!-- Box dimensions -->
        <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1">Box Dimensions (L × W × H, in)</label>
        <div class="grid grid-cols-3 gap-3 mb-4 max-w-sm">
            <input v-model="newPartForm.box_length" type="number" step="any" min="0" placeholder="L"
                class="px-3 py-2 border border-gray-300 rounded-lg text-gray-800 text-sm focus:outline-none focus:border-teal-400">
            <input v-model="newPartForm.box_width" type="number" step="any" min="0" placeholder="W"
                class="px-3 py-2 border border-gray-300 rounded-lg text-gray-800 text-sm focus:outline-none focus:border-teal-400">
            <input v-model="newPartForm.box_height" type="number" step="any" min="0" placeholder="H"
                class="px-3 py-2 border border-gray-300 rounded-lg text-gray-800 text-sm focus:outline-none focus:border-teal-400">
        </div>

        <!-- Attributes -->
        <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1">Attributes</label>
        <div class="grid grid-cols-4 gap-x-4 gap-y-2 mb-4 border border-gray-200 rounded-xl p-3">
            <label v-for="a in itemAttributes" :key="a.key"
                class="flex items-center gap-2 text-sm text-gray-700 select-none">
                <input v-model="newPartForm[a.key]" type="checkbox"
                    class="w-4 h-4 rounded border-gray-300 text-teal-600 focus:ring-teal-400">
                {{ a.label }}
            </label>
        </div>

        <!-- Initial BOM -->
        <div class="border border-gray-200 rounded-xl p-3 mb-4">
            <div class="flex items-center gap-3 mb-2">
                <p class="text-xs font-bold text-gray-700 uppercase tracking-wide flex-1">
                    BOM / Materials Used
                    <span class="font-normal normal-case text-gray-400">— raw material (steel) + components and how much of each</span>
                </p>
                <button @click="addNewPartBomRow"
                    class="bg-teal-600 hover:bg-teal-500 text-white px-3 py-1 rounded-lg font-bold text-xs active:scale-95 transition-all">+ Add Line</button>
            </div>
            <p v-if="!newPartBomLines.length" class="text-xs text-gray-400 italic">No BOM lines — fine for purchased parts.</p>
            <div v-for="(row, idx) in newPartBomLines" :key="idx" class="flex items-center gap-2 mb-1.5">
                <input v-model="row.item_child" type="text" placeholder="Component / material part #"
                    class="w-64 px-3 py-1.5 border border-gray-300 rounded-lg text-sm text-gray-800 font-mono uppercase focus:outline-none focus:border-teal-400">
                <input v-model="row.qty_per_assy" type="number" step="any" min="0" placeholder="Qty"
                    class="w-24 px-3 py-1.5 border border-gray-300 rounded-lg text-sm text-gray-800 focus:outline-none focus:border-teal-400">
                <button @click="removeNewPartBomRow(idx)"
                    class="p-1.5 rounded-lg text-gray-400 hover:text-red-600 hover:bg-red-50 transition-colors">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>
        </div>

        <!-- Actions -->
        <div class="flex gap-3 justify-end">
            <button @click="closeNewPartForm"
                class="px-5 py-2 bg-gray-100 hover:bg-gray-200 text-gray-600 font-bold rounded-xl text-sm transition-colors">Cancel</button>
            <button @click="submitNewPart" :disabled="newPartSaving"
                class="px-5 py-2 bg-teal-600 hover:bg-teal-500 disabled:opacity-50 text-white font-bold rounded-xl text-sm active:scale-95 transition-all">
                {{ newPartSaving ? 'Creating…' : 'Create Part' }}
            </button>
        </div>
    </div>
</div>
