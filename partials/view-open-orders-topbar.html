<!-- ============================================================
     view-open-orders-topbar.html — Open Orders top bar.
     Teleports into #oo-topbar (view-open-orders.html, line-cap split).
     ============================================================ -->
<Teleport v-if="currentView === 'open_orders'" to="#oo-topbar">
                <div class="shrink-0 bg-slate-900 px-4 py-2 flex items-center gap-4 border-b border-slate-700">
                    <button @click="goBack"
                        class="text-slate-400 hover:text-white flex items-center gap-1 text-xs font-medium transition-colors shrink-0">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"/>
                        </svg>
                        Back
                    </button>
                    <h2 class="text-white font-bold text-base shrink-0">Open Orders</h2>

                    <!-- Color legend -->
                    <div class="flex items-center gap-3 text-xs ml-4">
                        <span class="text-slate-400 font-semibold">Row colors:</span>
                        <span class="flex items-center gap-1 text-slate-300">
                            <span class="w-3 h-3 rounded-sm bg-orange-400 inline-block"></span> VA
                        </span>
                        <span class="flex items-center gap-1 text-slate-300">
                            <span class="w-3 h-3 rounded-sm bg-yellow-400 inline-block"></span> Shipping
                        </span>
                        <span class="flex items-center gap-1 text-slate-300">
                            <span class="w-3 h-3 rounded-sm bg-pink-400 inline-block"></span> Office / Dan K
                        </span>
                        <span class="flex items-center gap-1 text-slate-300">
                            <span class="w-3 h-3 rounded-sm bg-blue-400 inline-block"></span> Shop Manager
                        </span>
                    </div>

                    <div class="flex-1"></div>

                    <!-- Filter box (matches part #, description, customer, SO#, WO/PO#, bins, notes) -->
                    <div class="relative shrink-0">
                        <input v-model="openOrdersFilter" type="text"
                               placeholder="Filter: part #, customer, SO#…"
                               class="w-64 bg-slate-800 border border-slate-600 focus:border-indigo-400 text-white placeholder-slate-500 rounded-lg pl-3 pr-7 py-1.5 text-xs focus:outline-none transition-colors" />
                        <button v-if="openOrdersFilter" @click="openOrdersFilter = ''"
                                title="Clear filter"
                                class="absolute right-1.5 top-1/2 -translate-y-1/2 text-slate-400 hover:text-white transition-colors">
                            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"/>
                            </svg>
                        </button>
                    </div>

                    <!-- Task Reminder Emails button -->
                    <button @click="reminderEmailModalOpen = true"
                        class="text-slate-400 hover:text-white flex items-center gap-1.5 text-xs font-medium transition-colors shrink-0 border border-slate-600 hover:border-slate-400 px-3 py-1.5 rounded-lg">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                        </svg>
                        Task Reminder Emails
                    </button>

                    <!-- Completed Orders link -->
                    <button @click="enterCompletedOrdersView()"
                        class="text-slate-400 hover:text-white flex items-center gap-1.5 text-xs font-medium transition-colors shrink-0 border border-slate-600 hover:border-slate-400 px-3 py-1.5 rounded-lg">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                        </svg>
                        Completed Orders
                    </button>

                    <!-- Add Row(s) button -->
                    <button @click="openOrderAddModalOpen = true"
                        class="bg-indigo-600 hover:bg-indigo-500 active:bg-indigo-700 text-white px-4 py-1.5 rounded-lg text-xs font-semibold flex items-center gap-2 transition-colors shrink-0">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"/>
                        </svg>
                        Add Row(s)
                    </button>
                </div>

                <!-- ── Shipping sub-tabs ──────────────────────── -->
                <div class="shrink-0 bg-slate-800 px-4 flex items-center gap-1 border-b border-slate-700">
                    <button @click="setShippingTab('orders')"
                        class="px-4 py-2 text-xs font-bold border-b-2 transition-colors"
                        :class="shippingTab === 'orders' ? 'text-white border-indigo-400' : 'text-slate-400 border-transparent hover:text-slate-200'">
                        Open Orders
                    </button>
                    <button @click="setShippingTab('boxed')"
                        class="px-4 py-2 text-xs font-bold border-b-2 transition-colors flex items-center gap-2"
                        :class="shippingTab === 'boxed' ? 'text-white border-emerald-400' : 'text-slate-400 border-transparent hover:text-slate-200'">
                        Boxed, Ready to Ship
                        <span v-if="boxedOrders.length"
                              class="bg-emerald-500 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full">
                            {{ boxedOrders.length }}
                        </span>
                    </button>
                </div>
</Teleport>
