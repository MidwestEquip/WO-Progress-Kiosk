        <!-- ══ MODALS ════════════════════════════════════════════ -->

        <!-- PIN Modal -->
        <div v-if="pinModalOpen" class="fixed z-50 inset-0 bg-black/80 flex items-center justify-center">
            <div class="bg-slate-800 p-8 rounded-xl w-96 text-center border border-slate-600">
                <h3 class="text-2xl font-bold mb-4 uppercase text-white">{{ pinMode }} LOGIN</h3>
                <input v-model="pinInput" type="password" placeholder="PIN"
                    autocomplete="new-password"
                    readonly
                    @focus="$event.target.removeAttribute('readonly')"
                    class="w-full text-center text-3xl tracking-[1em] p-4 bg-slate-900 border border-slate-700 rounded-lg mb-6"
                    @keyup.enter="submitPin">
                <div class="flex gap-4">
                    <button @click="pinModalOpen = false" class="flex-1 p-3 bg-red-600 rounded font-bold">CANCEL</button>
                    <button @click="submitPin" class="flex-1 p-3 bg-blue-600 rounded font-bold text-white">ENTER</button>
                </div>
            </div>
        </div>
